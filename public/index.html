<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Power</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ccc;
      user-select: none;
    }

    .power-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #c0392b;
      background: radial-gradient(circle at 40% 35%, #e74c3c, #922b21);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(231, 76, 60, 0.5), 0 6px 20px rgba(0,0,0,0.6);
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease, border-color 0.2s ease;
      outline: none;
    }

    .power-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 45px rgba(231, 76, 60, 0.75), 0 8px 25px rgba(0,0,0,0.7);
    }

    .power-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .power-btn:disabled {
      background: radial-gradient(circle at 40% 35%, #555, #333);
      border-color: #444;
      cursor: not-allowed;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .power-icon {
      width: 52px;
      height: 52px;
      pointer-events: none;
    }

    .status {
      margin-top: 32px;
      font-size: 0.95rem;
      letter-spacing: 1px;
      height: 24px;
      transition: opacity 0.3s ease;
    }

    .status.visible {
      color: #e67e22;
    }

    .status.error {
      color: #e74c3c;
    }
  </style>
</head>
<body>

  <button class="power-btn" id="powerBtn" onclick="triggerPower()">
    <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
      <line x1="12" y1="2" x2="12" y2="12"/>
    </svg>
  </button>

  <div class="status" id="status"></div>

  <script>
    const btn = document.getElementById('powerBtn');
    const statusEl = document.getElementById('status');

    async function triggerPower() {
      btn.disabled = true;
      statusEl.textContent = 'Bekapcsolás folyamatban...';
      statusEl.className = 'status visible';

      try {
        const res = await fetch('/trigger', { method: 'POST' });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || `Hiba: ${res.status}`);
        }

        setTimeout(() => {
          btn.disabled = false;
          statusEl.textContent = '';
          statusEl.className = 'status';
        }, 1500);

      } catch (err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status error';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
